# values-staging.yaml — Staging environment overrides

replicaCount: 2

image:
  repository: ""  # Set by CI/CD: acrnodejsstaging<suffix>.azurecr.io/nodejs-app
  tag: ""         # Set by CI/CD: git SHA

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# Ingress disabled: no NGINX Ingress Controller installed in staging
ingress:
  enabled: false

# No availability zones in staging — disable zone-based topology spread
topologySpreadConstraints: []

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

config:
  PORT: "3000"
  NODE_ENV: "staging"
  LOG_LEVEL: "debug"

# NetworkPolicy disabled in staging — no NGINX Ingress Controller installed,
# and Azure NPM blocks kubelet health probes without nodeSubnetCidr configuration.
# Enable in production with the correct nodeSubnetCidr.
networkPolicy:
  enabled: false
