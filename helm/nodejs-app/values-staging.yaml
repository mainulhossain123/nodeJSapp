# values-staging.yaml — Staging environment overrides

replicaCount: 2

image:
  repository: ""  # Set by CI/CD: acrnodejsstaging<suffix>.azurecr.io/nodejs-app
  tag: ""         # Set by CI/CD: git SHA

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

ingress:
  enabled: true
  hosts:
    - host: nodejs-app-staging.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: nodejs-app-staging-tls
      hosts:
        - nodejs-app-staging.example.com

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

config:
  PORT: "3000"
  NODE_ENV: "staging"
  LOG_LEVEL: "debug"

networkPolicy:
  enabled: true
