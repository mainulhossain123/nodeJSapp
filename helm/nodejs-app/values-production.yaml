# values-production.yaml — Production environment overrides

replicaCount: 3

image:
  repository: ""  # Set by CI/CD: acrnodejsproduction<suffix>.azurecr.io/nodejs-app
  tag: ""         # Set by CI/CD: git SHA

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "512Mi"

ingress:
  enabled: true
  hosts:
    - host: nodejs-app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: nodejs-app-production-tls
      hosts:
        - nodejs-app.example.com

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

config:
  PORT: "3000"
  NODE_ENV: "production"
  LOG_LEVEL: "warn"

secrets:
  enabled: true
  keyVaultName: "kv-nodejs-production"

networkPolicy:
  enabled: true
