# values.yaml — Default configuration values
# Override per environment via values-staging.yaml / values-production.yaml

# -- Number of pod replicas (ignored when autoscaling is enabled)
replicaCount: 2

# -- Override chart name
nameOverride: ""
# -- Override fully qualified app name
fullnameOverride: ""

image:
  # -- Container image repository (set at deploy time: <acr>.azurecr.io/nodejs-app)
  repository: ""
  # -- Image tag (overridden in CI/CD with git SHA - NEVER use latest in production)
  tag: "latest"
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Image pull secrets (if using private registry without managed identity)
imagePullSecrets: []

# Service Account configuration
serviceAccount:
  # -- Create a service account
  create: true
  # -- Service account name
  name: "nodejs-app-sa"
  # -- Annotations for the service account (e.g., workload identity)
  annotations: {}

# Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

# Container-level security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Resource requests and limits
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 3000

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: nodejs-app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: nodejs-app-tls
      hosts:
        - nodejs-app.example.com

# Liveness Probe: Is the container ALIVE? If fails → restart container
livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  successThreshold: 1
  timeoutSeconds: 5

# Readiness Probe: Should this pod RECEIVE TRAFFIC?
readinessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 3
  successThreshold: 1
  timeoutSeconds: 3

# Startup Probe: Prevents liveness kills during slow startup
startupProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 12
  timeoutSeconds: 3

# Horizontal Pod Autoscaler
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Pod topology spread constraints
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels: {}
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels: {}

# Node selection and tolerations
nodeSelector:
  nodepool-type: "user"

tolerations:
  - key: "workload"
    operator: "Equal"
    value: "application"
    effect: "NoSchedule"

# Pod anti-affinity
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - nodejs-app
          topologyKey: kubernetes.io/hostname

# Application configuration (non-sensitive)
config:
  PORT: "3000"
  NODE_ENV: "production"
  LOG_LEVEL: "info"

# Secret references
secrets:
  enabled: false
  keyVaultName: ""
  tenantId: ""
  secretObjects: []

# Network Policy
networkPolicy:
  enabled: true
  # CIDR of the AKS node subnet — required for kubelet health probes.
  # Kubelet runs on the host network (not as a pod), so it needs an ipBlock rule.
  # Must match the AKS subnet CIDR from Terraform (e.g., 10.0.1.0/24).
  nodeSubnetCidr: ""
