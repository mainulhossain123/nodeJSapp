{{- if .Values.secrets.enabled }}
# Secrets are provided via Azure Key Vault CSI Driver
# This SecretProviderClass mounts secrets from Azure Key Vault into the pod
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "nodejs-app.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nodejs-app.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    keyvaultName: {{ .Values.secrets.keyVaultName | quote }}
    tenantId: {{ .Values.secrets.tenantId | default "" | quote }}
    objects: |
      array:
        {{- range .Values.secrets.secretObjects }}
        - |
          objectName: {{ .name }}
          objectType: secret
          objectVersion: ""
        {{- end }}
  {{- if .Values.secrets.secretObjects }}
  secretObjects:
    - secretName: {{ include "nodejs-app.fullname" . }}-kv-secrets
      type: Opaque
      data:
        {{- range .Values.secrets.secretObjects }}
        - objectName: {{ .name }}
          key: {{ .key | default .name }}
        {{- end }}
  {{- end }}
{{- end }}
