# cd.yml — Continuous Deployment
# Deploys to staging automatically when CI passes on main.
# Deploys to production via manual trigger (requires approval).
#
# Delivery method: kubectl apply -k (kustomize overlays in k8s/overlays/)
# No Helm — avoids rate-limiter/kubelogin overhead on AAD-enabled AKS clusters.

name: CD — Deploy to AKS

on:
  # Auto-deploy to staging when CI passes on main
  workflow_run:
    workflows: ["CI — Build, Test & Push"]
    types: [completed]
    branches: [main]
  # Manual production deployment trigger
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: "Docker image tag to deploy (git SHA)"
        required: true
        type: string

env:
  # All resource names follow the Terraform naming convention —
  # no extra secrets needed beyond AZURE_CREDENTIALS.
  RG_STAGING:     rg-nodejs-aks-staging
  AKS_STAGING:    aks-nodejs-staging
  RG_PRODUCTION:  rg-nodejs-aks-production
  AKS_PRODUCTION: aks-nodejs-production

permissions:
  contents: read
  id-token: write

jobs:
  # ─── Deploy to Staging ────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: https://nodejs-app-staging.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Check out the exact SHA that CI built to keep manifests in sync
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve ACR login server
        run: |
          ACR_LOGIN_SERVER=$(az acr list \
            --resource-group ${{ env.RG_STAGING }} \
            --query "[0].loginServer" -o tsv)
          echo "ACR_LOGIN_SERVER=${ACR_LOGIN_SERVER}" >> $GITHUB_ENV

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RG_STAGING }}
          cluster-name: ${{ env.AKS_STAGING }}

      - name: Install kubelogin
        uses: azure/use-kubelogin@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          kubelogin-version: "latest"

      - name: Convert kubeconfig for AAD auth
        run: kubelogin convert-kubeconfig -l azurecli

      - name: Determine image tag
        id: image-tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Validate manifests (dry-run)
        run: kubectl apply -k k8s/overlays/staging --dry-run=client

      - name: Set image in staging overlay
        run: |
          sed -i "s|REGISTRY_PLACEHOLDER|${{ env.ACR_LOGIN_SERVER }}/nodejs-app|g" \
            k8s/overlays/staging/kustomization.yaml
          sed -i "s|TAG_PLACEHOLDER|${{ steps.image-tag.outputs.tag }}|g" \
            k8s/overlays/staging/kustomization.yaml

      - name: Deploy to staging
        run: kubectl apply -k k8s/overlays/staging

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/nodejs-app \
            -n nodejs-app-staging \
            --timeout=5m

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Nodes ==="
          kubectl get nodes -o wide || true
          echo "=== Pods ==="
          kubectl get pods -n nodejs-app-staging -o wide || true
          echo "=== Pod events ==="
          kubectl describe pods -n nodejs-app-staging || true

      - name: Smoke test
        run: |
          kubectl port-forward svc/nodejs-app 8080:80 -n nodejs-app-staging &
          sleep 5
          curl -sf http://localhost:8080/health || exit 1
          echo "Smoke test passed."

  # ─── Deploy to Production (Manual Approval Required) ─────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://nodejs-app.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve ACR login server
        run: |
          ACR_LOGIN_SERVER=$(az acr list \
            --resource-group ${{ env.RG_STAGING }} \
            --query "[0].loginServer" -o tsv)
          echo "ACR_LOGIN_SERVER=${ACR_LOGIN_SERVER}" >> $GITHUB_ENV

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RG_PRODUCTION }}
          cluster-name: ${{ env.AKS_PRODUCTION }}

      - name: Install kubelogin
        uses: azure/use-kubelogin@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          kubelogin-version: "latest"

      - name: Convert kubeconfig for AAD auth
        run: kubelogin convert-kubeconfig -l azurecli

      - name: Validate manifests (dry-run)
        run: kubectl apply -k k8s/overlays/production --dry-run=client

      - name: Set image in production overlay
        run: |
          sed -i "s|REGISTRY_PLACEHOLDER|${{ env.ACR_LOGIN_SERVER }}/nodejs-app|g" \
            k8s/overlays/production/kustomization.yaml
          sed -i "s|TAG_PLACEHOLDER|${{ github.event.inputs.image_tag }}|g" \
            k8s/overlays/production/kustomization.yaml

      - name: Deploy to production
        run: kubectl apply -k k8s/overlays/production

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/nodejs-app \
            -n nodejs-app-production \
            --timeout=10m

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Nodes ==="
          kubectl get nodes -o wide || true
          echo "=== Pods ==="
          kubectl get pods -n nodejs-app-production -o wide || true
          echo "=== Pod events ==="
          kubectl describe pods -n nodejs-app-production || true

      - name: Smoke test
        run: |
          kubectl port-forward svc/nodejs-app 8080:80 -n nodejs-app-production &
          sleep 5
          curl -sf http://localhost:8080/health || exit 1
          curl -sf http://localhost:8080/ || exit 1
          echo "Smoke test passed."

      - name: Annotate rollout
        if: success()
        run: |
          kubectl annotate deployment/nodejs-app \
            -n nodejs-app-production \
            kubernetes.io/change-cause="image=${{ env.ACR_LOGIN_SERVER }}/nodejs-app:${{ github.event.inputs.image_tag }} via GitHub Actions" \
            --overwrite
