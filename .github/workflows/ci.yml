# ci.yml — Continuous Integration
# Triggers on: every push to main/develop, every PR
# Does: lint → test → build image → scan → push to ACR

name: CI — Build, Test & Push

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  # IMAGE_NAME and IMAGE_TAG are fixed.
  # ACR_LOGIN_SERVER and ACR_NAME are resolved at runtime after az login
  # (queried from Azure — no secrets needed beyond AZURE_CREDENTIALS).
  IMAGE_NAME: nodejs-app
  IMAGE_TAG: ${{ github.sha }}

# Prevent concurrent CI runs on the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  # ─── Job 1: Lint & Test ───────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter (if configured)
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run tests (if configured)
        run: npm test --if-present
        continue-on-error: true

  # ─── Job 2: Build & Push Docker Image ────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    # Only push on main branch (not PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve ACR details from Azure
        run: |
          ACR_LOGIN_SERVER=$(az acr list \
            --resource-group rg-nodejs-aks-staging \
            --query "[0].loginServer" -o tsv)
          ACR_NAME=$(az acr list \
            --resource-group rg-nodejs-aks-staging \
            --query "[0].name" -o tsv)
          echo "ACR_LOGIN_SERVER=${ACR_LOGIN_SERVER}" >> $GITHUB_ENV
          echo "ACR_NAME=${ACR_NAME}" >> $GITHUB_ENV

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build only the runtime stage
          target: runtime

      - name: Output image digest
        run: echo "Image pushed → ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

  # ─── Job 3: Security Scanning ─────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve ACR details from Azure
        run: |
          ACR_LOGIN_SERVER=$(az acr list \
            --resource-group rg-nodejs-aks-staging \
            --query "[0].loginServer" -o tsv)
          ACR_NAME=$(az acr list \
            --resource-group rg-nodejs-aks-staging \
            --query "[0].name" -o tsv)
          echo "ACR_LOGIN_SERVER=${ACR_LOGIN_SERVER}" >> $GITHUB_ENV
          echo "ACR_NAME=${ACR_NAME}" >> $GITHUB_ENV

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Pull built image for scanning
        run: docker pull ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.16.1
        with:
          image-ref: "${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: "trivy-results.sarif"

      - name: Run Dockerfile linting with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
