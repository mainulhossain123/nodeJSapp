# Strategic merge patch — override environment-specific container env vars
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app
spec:
  template:
    spec:
      containers:
        - name: nodejs-app
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "staging"
            - name: LOG_LEVEL
              value: "debug"
